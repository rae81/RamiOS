name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
      - name: Build Static Export
        run: npm run build
      - name: Ensure GitHub Pages skips Jekyll
        run: test -f out/.nojekyll || touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
