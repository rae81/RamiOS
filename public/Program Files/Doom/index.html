<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>DOOM</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #100707;
        --bg2: #2a0d0d;
        --panel: rgba(22, 9, 9, 0.86);
        --text: #f7e9cf;
        --muted: #d5b790;
        --accent: #d93a17;
        --accent-2: #f6b335;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", Verdana, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(217, 58, 23, 0.18), transparent 34%),
          linear-gradient(180deg, var(--bg2), var(--bg));
      }

      main {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 16px;
        padding: 18px;
      }

      header,
      footer {
        background: var(--panel);
        border: 1px solid rgba(246, 179, 53, 0.18);
        border-radius: 14px;
        padding: 12px 16px;
        backdrop-filter: blur(10px);
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.4rem, 2.6vw, 2.2rem);
        letter-spacing: 0.12em;
      }

      .badge {
        border: 1px solid rgba(246, 179, 53, 0.25);
        border-radius: 999px;
        padding: 6px 10px;
        color: var(--accent-2);
        font-size: 0.8rem;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .stage {
        background: rgba(8, 3, 3, 0.7);
        border: 1px solid rgba(217, 58, 23, 0.22);
        border-radius: 18px;
        overflow: hidden;
        min-height: 560px;
        position: relative;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      }

      #doom {
        width: 100%;
        height: 100%;
        min-height: 560px;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(10, 4, 4, 0.08), rgba(10, 4, 4, 0.5)),
          radial-gradient(circle at center, rgba(246, 179, 53, 0.16), transparent 36%);
        transition: opacity 0.35s ease;
      }

      .overlay.hidden {
        opacity: 0;
      }

      .status-card {
        max-width: 520px;
        padding: 20px 22px;
        background: rgba(18, 8, 8, 0.88);
        border: 1px solid rgba(246, 179, 53, 0.22);
        border-radius: 16px;
        text-align: center;
      }

      .status-card strong {
        display: block;
        color: var(--accent-2);
        margin-bottom: 8px;
        font-size: 1rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #status {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      footer {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: space-between;
        font-size: 0.92rem;
      }

      .tip {
        color: var(--muted);
      }

      .tip strong {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>DOOM</h1>
        <div class="badge">Desktop Launcher</div>
      </header>

      <section class="stage">
        <div id="doom"></div>
        <div class="overlay" id="overlay">
          <div class="status-card">
            <strong>Loading Shareware DOOM</strong>
            <p id="status">
              Preparing the local bundle and starting the DOS runtime.
            </p>
          </div>
        </div>
      </section>

      <footer>
        <div class="tip"><strong>Controls:</strong> keyboard and mouse after launch.</div>
        <div class="tip"><strong>Note:</strong> first click may be needed to capture input and audio.</div>
      </footer>
    </main>

    <script src="https://js-dos.com/cdn/js-dos-api.js"></script>
    <script>
      const overlay = document.getElementById("overlay");
      const status = document.getElementById("status");

      const setStatus = (message, hideOverlay = false) => {
        status.textContent = message;
        overlay.classList.toggle("hidden", hideOverlay);
      };

      try {
        const dosbox = new Dosbox({
          id: "doom",
          onload: function (instance) {
            setStatus("Launching DOOM...");
            instance.run(
              "/Program%20Files/Doom/DOOM-%40evilution.zip",
              "./DOOM/DOOM.EXE"
            );
          },
          onrun: function () {
            setStatus(
              "DOOM is running. Click inside the game if keyboard or mouse input is not active yet.",
              true
            );
          },
        });

        window.addEventListener("error", function () {
          setStatus(
            "DOOM failed to start in this session. Reload the page and try again."
          );
        });

        window.doomLauncher = dosbox;
      } catch (_error) {
        setStatus(
          "The Doom launcher could not initialize. Reload the page and try again."
        );
      }
    </script>
  </body>
</html>
